services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: blog010:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/blog010.db}
      NODE_ENV: production
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:

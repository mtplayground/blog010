services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: blog010:latest
    ports:
      - "8080:8080"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
      DATABASE_URL: ${DATABASE_URL:-file:/data/blog010.db}
      NODE_ENV: production
    command: >
      sh -c "npx prisma@5.16.2 migrate deploy --schema prisma/schema.prisma &&
      npm run start"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
